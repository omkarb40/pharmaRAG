<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PharmaRAG — Drug Safety QA</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: #f5f5f5;
  height: 100vh;
  display: flex;
  flex-direction: column;
}

/* Header */
.header {
  background: #1a1a2e;
  color: white;
  padding: 16px 24px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.header-icon {
  width: 36px; height: 36px;
  background: #0f3460;
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
}
.header-title { font-size: 18px; font-weight: 600; }
.header-sub { font-size: 12px; color: #94a3b8; margin-top: 2px; }
.header-stats {
  margin-left: auto;
  font-size: 12px;
  color: #94a3b8;
  text-align: right;
}
.header-stats span { color: #22c55e; font-weight: 600; }

/* Chat area */
.chat-container {
  flex: 1;
  overflow-y: auto;
  padding: 24px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

/* Messages */
.message {
  max-width: 85%;
  padding: 14px 18px;
  border-radius: 16px;
  font-size: 14px;
  line-height: 1.6;
  animation: fadeIn 0.3s ease;
}
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

.message.user {
  align-self: flex-end;
  background: #1a1a2e;
  color: white;
  border-bottom-right-radius: 4px;
}
.message.bot {
  align-self: flex-start;
  background: white;
  color: #1a1a2e;
  border: 1px solid #e2e8f0;
  border-bottom-left-radius: 4px;
}
.message.bot.error {
  border-color: #fca5a5;
  background: #fef2f2;
}

/* Welcome message */
.welcome {
  text-align: center;
  padding: 40px 20px;
  color: #64748b;
}
.welcome h2 { color: #1a1a2e; margin-bottom: 8px; font-size: 20px; }
.welcome p { font-size: 14px; margin-bottom: 20px; }
.example-queries {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  justify-content: center;
}
.example-btn {
  background: white;
  border: 1px solid #e2e8f0;
  border-radius: 20px;
  padding: 8px 16px;
  font-size: 13px;
  color: #475569;
  cursor: pointer;
  transition: all 0.2s;
}
.example-btn:hover {
  border-color: #1a1a2e;
  color: #1a1a2e;
  background: #f8fafc;
}

/* Answer sections inside bot message */
.answer-text { margin-bottom: 12px; white-space: pre-wrap; }

.confidence-badge {
  display: inline-block;
  padding: 4px 12px;
  border-radius: 12px;
  font-size: 12px;
  font-weight: 600;
  margin-bottom: 12px;
}
.confidence-badge.answer { background: #dcfce7; color: #166534; }
.confidence-badge.caution { background: #fef3c7; color: #92400e; }
.confidence-badge.refuse { background: #fecaca; color: #991b1b; }

.details-toggle {
  background: none;
  border: 1px solid #e2e8f0;
  border-radius: 8px;
  padding: 6px 14px;
  font-size: 12px;
  color: #64748b;
  cursor: pointer;
  margin-top: 8px;
}
.details-toggle:hover { background: #f8fafc; color: #1a1a2e; }

.details-panel {
  display: none;
  margin-top: 12px;
  padding: 12px;
  background: #f8fafc;
  border-radius: 8px;
  font-size: 12px;
  border: 1px solid #e2e8f0;
}
.details-panel.open { display: block; }

.detail-section { margin-bottom: 12px; }
.detail-section:last-child { margin-bottom: 0; }
.detail-title {
  font-weight: 600;
  color: #1a1a2e;
  margin-bottom: 6px;
  font-size: 13px;
}

.citation-item {
  padding: 6px 0;
  border-bottom: 1px solid #e2e8f0;
}
.citation-item:last-child { border-bottom: none; }
.citation-drug { font-weight: 600; color: #0f3460; }
.citation-section { color: #64748b; }

.groundedness-bar {
  height: 6px;
  background: #e2e8f0;
  border-radius: 3px;
  margin: 6px 0;
  overflow: hidden;
}
.groundedness-fill {
  height: 100%;
  border-radius: 3px;
  transition: width 0.5s ease;
}

.latency-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 4px 12px;
}
.latency-label { color: #64748b; }
.latency-value { font-weight: 500; text-align: right; }

/* Sentence validation */
.sentence-item {
  padding: 6px 0;
  border-bottom: 1px solid #f1f5f9;
  display: flex;
  gap: 8px;
  align-items: flex-start;
}
.sentence-item:last-child { border-bottom: none; }
.sentence-status {
  min-width: 18px; height: 18px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px;
  margin-top: 2px;
}
.sentence-status.supported { background: #dcfce7; color: #166534; }
.sentence-status.unsupported { background: #fecaca; color: #991b1b; }

/* Typing indicator */
.typing {
  align-self: flex-start;
  background: white;
  border: 1px solid #e2e8f0;
  border-radius: 16px;
  padding: 14px 18px;
  display: none;
}
.typing.show { display: flex; gap: 4px; align-items: center; }
.typing-dot {
  width: 8px; height: 8px;
  background: #94a3b8;
  border-radius: 50%;
  animation: bounce 1.4s infinite;
}
.typing-dot:nth-child(2) { animation-delay: 0.2s; }
.typing-dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes bounce {
  0%, 60%, 100% { transform: translateY(0); }
  30% { transform: translateY(-8px); }
}

/* Input area */
.input-area {
  background: white;
  border-top: 1px solid #e2e8f0;
  padding: 16px 24px;
  display: flex;
  gap: 12px;
}
.input-area input {
  flex: 1;
  padding: 12px 16px;
  border: 1px solid #e2e8f0;
  border-radius: 24px;
  font-size: 14px;
  outline: none;
  transition: border-color 0.2s;
}
.input-area input:focus { border-color: #1a1a2e; }
.input-area input:disabled { background: #f5f5f5; }
.send-btn {
  width: 44px; height: 44px;
  background: #1a1a2e;
  color: white;
  border: none;
  border-radius: 50%;
  font-size: 18px;
  cursor: pointer;
  transition: background 0.2s;
  display: flex; align-items: center; justify-content: center;
}
.send-btn:hover { background: #0f3460; }
.send-btn:disabled { background: #94a3b8; cursor: not-allowed; }
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="header-icon">&#x1F9EC;</div>
  <div>
    <div class="header-title">PharmaRAG</div>
    <div class="header-sub">Drug Safety QA — FDA Label Evidence</div>
  </div>
  <div class="header-stats" id="stats-display">
    Loading stats...
  </div>
</div>

<!-- Chat -->
<div class="chat-container" id="chat">
  <div class="welcome" id="welcome">
    <h2>Ask a drug safety question</h2>
    <p>PharmaRAG answers from FDA drug labels with citations and evidence grounding.</p>
    <div class="example-queries">
      <button class="example-btn" onclick="askExample(this)">What are the contraindications for natalizumab?</button>
      <button class="example-btn" onclick="askExample(this)">Is teriflunomide safe during pregnancy?</button>
      <button class="example-btn" onclick="askExample(this)">What are the black box warnings for fingolimod?</button>
      <button class="example-btn" onclick="askExample(this)">Can I take this drug if I have liver problems?</button>
      <button class="example-btn" onclick="askExample(this)">What are the serious infection risks with ocrelizumab?</button>
    </div>
  </div>

  <div class="typing" id="typing">
    <div class="typing-dot"></div>
    <div class="typing-dot"></div>
    <div class="typing-dot"></div>
  </div>
</div>

<!-- Input -->
<div class="input-area">
  <input type="text" id="query-input" placeholder="Ask about drug safety, contraindications, side effects..."
         onkeydown="if(event.key==='Enter') sendMessage()">
  <button class="send-btn" id="send-btn" onclick="sendMessage()">&#x27A4;</button>
</div>

<script>
const API_BASE = '';
const chat = document.getElementById('chat');
const typing = document.getElementById('typing');
const input = document.getElementById('query-input');
const sendBtn = document.getElementById('send-btn');
const welcome = document.getElementById('welcome');
let messageCount = 0;

// Load stats on page load
async function loadStats() {
  try {
    const res = await fetch(API_BASE + '/api/stats');
    const data = await res.json();
    document.getElementById('stats-display').innerHTML =
      `<span>${data.total_drugs}</span> drugs &middot; <span>${data.total_chunks}</span> chunks`;
  } catch (e) {
    document.getElementById('stats-display').textContent = 'API unavailable';
  }
}
loadStats();

function askExample(btn) {
  input.value = btn.textContent;
  sendMessage();
}

function addMessage(text, type) {
  if (welcome) welcome.style.display = 'none';
  const div = document.createElement('div');
  div.className = `message ${type}`;
  div.innerHTML = text;
  chat.insertBefore(div, typing);
  chat.scrollTop = chat.scrollHeight;
  messageCount++;
  return div;
}

function buildBotMessage(data) {
  // Confidence badge
  const decision = data.confidence.decision;
  let badgeClass = 'answer';
  let badgeLabel = 'ANSWER';
  if (decision === 'ANSWER_WITH_CAUTION') { badgeClass = 'caution'; badgeLabel = 'ANSWER WITH CAUTION'; }
  if (decision === 'INSUFFICIENT_EVIDENCE') { badgeClass = 'refuse'; badgeLabel = 'INSUFFICIENT EVIDENCE'; }

  // Groundedness bar color
  const gs = data.groundedness.groundedness_score;
  let barColor = '#22c55e';
  if (gs < 0.85) barColor = '#f59e0b';
  if (gs < 0.5) barColor = '#ef4444';

  const detailId = 'details-' + messageCount;

  // Format answer text — preserve line breaks and bold citation markers
  let answerHtml = data.answer
    .replace(/\n/g, '<br>')
    .replace(/\[(\d+)\]/g, '<strong style="color:#0f3460;">[$1]</strong>');

  // Citations list
  let citationsHtml = data.citations.map(c =>
    `<div class="citation-item">
      <strong>[${c.citation_id}]</strong>
      <span class="citation-drug">${c.drug_name}</span>
      (<span class="citation-section">${c.section_name.replace(/_/g, ' ')}</span>)
      <br><span style="color:#64748b;">${c.text_snippet.substring(0, 120)}...</span>
    </div>`
  ).join('');

  // Sentence validations
  let sentencesHtml = data.groundedness.sentence_details.map(s =>
    `<div class="sentence-item">
      <div class="sentence-status ${s.is_supported ? 'supported' : 'unsupported'}">
        ${s.is_supported ? '&#10003;' : '&#10007;'}
      </div>
      <div>
        <div>${s.sentence.substring(0, 120)}${s.sentence.length > 120 ? '...' : ''}</div>
        <div style="color:#64748b;margin-top:2px;">
          Similarity: ${s.max_similarity.toFixed(3)} &middot; Best match: ${s.best_supporting_drug}
        </div>
      </div>
    </div>`
  ).join('');

  // Latency
  const lat = data.latency_ms;
  let latencyHtml = '';
  for (const [k, v] of Object.entries(lat)) {
    const label = k.replace(/_ms$/, '').replace(/_/g, ' ');
    const val = typeof v === 'number' ? (v / 1000).toFixed(1) + 's' : v;
    latencyHtml += `<div class="latency-label">${label}</div><div class="latency-value">${val}</div>`;
  }

  // Reasons
  let reasonsHtml = '';
  if (data.confidence.reasons.length > 0) {
    reasonsHtml = `<div class="detail-section">
      <div class="detail-title">&#9888; Reasons</div>
      ${data.confidence.reasons.map(r => `<div style="color:#92400e;padding:2px 0;">&bull; ${r}</div>`).join('')}
    </div>`;
  }

  return `
    <span class="confidence-badge ${badgeClass}">${badgeLabel} &middot; ${(data.confidence.confidence_score * 100).toFixed(0)}%</span>
    <div class="answer-text">${answerHtml}</div>
    <div style="font-size:12px;color:#64748b;margin-bottom:4px;">
      Routed to: ${data.routed_sections.map(s => s.replace(/_/g, ' ')).join(', ')}
    </div>
    <button class="details-toggle" onclick="toggleDetails('${detailId}')">
      Show evidence details &#9660;
    </button>
    <div class="details-panel" id="${detailId}">
      ${reasonsHtml}
      <div class="detail-section">
        <div class="detail-title">Groundedness: ${(gs * 100).toFixed(0)}%
          (${data.groundedness.supported_sentences}/${data.groundedness.total_sentences} sentences supported)
        </div>
        <div class="groundedness-bar">
          <div class="groundedness-fill" style="width:${gs * 100}%;background:${barColor};"></div>
        </div>
        ${sentencesHtml}
      </div>
      <div class="detail-section">
        <div class="detail-title">Citations</div>
        ${citationsHtml}
      </div>
      <div class="detail-section">
        <div class="detail-title">Latency</div>
        <div class="latency-grid">${latencyHtml}</div>
      </div>
    </div>
  `;
}

function toggleDetails(id) {
  const panel = document.getElementById(id);
  panel.classList.toggle('open');
  const btn = panel.previousElementSibling;
  btn.innerHTML = panel.classList.contains('open')
    ? 'Hide evidence details &#9650;'
    : 'Show evidence details &#9660;';
}

async function sendMessage() {
  const query = input.value.trim();
  if (!query) return;

  // Add user message
  addMessage(query, 'user');
  input.value = '';
  input.disabled = true;
  sendBtn.disabled = true;

  // Show typing indicator
  typing.classList.add('show');
  chat.scrollTop = chat.scrollHeight;

  try {
    const res = await fetch(API_BASE + '/api/ask', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ query: query, top_k: 5 }),
    });

    if (!res.ok) {
      throw new Error(`API error: ${res.status}`);
    }

    const data = await res.json();
    const botHtml = buildBotMessage(data);
    addMessage(botHtml, 'bot');

  } catch (err) {
    addMessage(`Could not get a response. Is the API running?<br><small>${err.message}</small>`, 'bot error');
  } finally {
    typing.classList.remove('show');
    input.disabled = false;
    sendBtn.disabled = false;
    input.focus();
  }
}
</script>
</body>
</html>
